apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eks-lab-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:085876626280:certificate/cabe4488-345f-410e-bc6e-c84bbbed3ec7
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  rules:
  - host: argocd.soumitripathy.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eks-lab-service
            port:
              number: 80
